name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Test suite
        run: python -B -m pytest -q

      # Determinism guard: the suite regenerates build/ artifacts and fixtures.
      # With deterministic timestamps (SOURCE_DATE_EPOCH, frozen in
      # tests/conftest.py) and regenerate-before-read fixtures, a green suite
      # must leave the working tree clean. A dirty tree here means a generator
      # is nondeterministic or an artifact drifted from its committed form.
      - name: Determinism guard (no artifact churn after tests)
        run: |
          if ! git diff --exit-code; then
            echo "::error::Test run left tracked files modified -- a generator is nondeterministic or a committed artifact is stale."
            git status --short
            exit 1
          fi
